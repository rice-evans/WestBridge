<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay Assistant</title>
    <style>
        :root {
            /* High-contrast smoky liquid glass design tokens */
            --glass-bg: rgba(20, 20, 20, 0.45);
            --glass-bg-hover: rgba(20, 20, 20, 0.55);
            --glass-bg-active: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.20);
            --glass-border-glow: rgba(255, 255, 255, 0.45);
            --text-color: #ffffff;
            --radius: 20px;
            --radius-sm: 10px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            color: var(--text-color);
        }

        body {
            background: #1a1a1a url('Background for WB.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-radius: var(--radius);
        }

        .controls {
            display: flex;
            align-items: center;
        }

        select {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 75px;
        }

        select:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-glow);
        }

        #clock {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            overflow: hidden;
        }

        nav {
            width: 260px;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .main-cats {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
        }

        .main-cats button {
            flex: 1;
            text-align: center;
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 8px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
        }

        .main-cats button:hover {
            background: var(--glass-bg-hover);
        }

        .main-cats button.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .sub-nav-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            list-style: none;
        }

        .sub-nav-item {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
        }

        .sub-nav-item:hover {
            background: var(--glass-bg-hover);
        }

        .sub-nav-item.active {
            background: var(--glass-bg-active);
            border-left: 3px solid #ffffff;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-weight: 600;
        }

        main {
            flex: 1;
            border-radius: var(--radius);
            padding: 36px;
            overflow-y: auto;
        }

        main h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .content-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .content-subheading {
            font-size: 18px;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        
        .content-divider {
            border: 0;
            border-top: 1px solid var(--glass-border);
            margin: 22px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header class="glass-panel">
        <div id="clock">Loading Time...</div>
        <div class="controls">
            <select id="timezone-select">
                <option value="local">LOC</option>
                <option value="UTC">UTC</option>
                <option value="America/New_York">EST</option>
                <option value="America/Los_Angeles">PST</option>
                <option value="Europe/London">GMT</option>
            </select>
        </div>
    </header>

    <div class="workspace">
        <nav class="glass-panel">
            <div class="main-cats">
                <button id="btn-EMS" onclick="switchMainPage('EMS')">EMS</button>
                <button id="btn-Fire" onclick="switchMainPage('Fire')">Fire</button>
                <button id="btn-LEO" onclick="switchMainPage('LEO')">LEO</button>
            </div>
            <ul class="sub-nav-list" id="sub-nav-container"></ul>
        </nav>

        <main class="glass-panel">
            <h1 id="content-title">Welcome</h1>
            <div id="content-body">Select a department and subpage to begin.</div>
        </main>
    </div>

    <script>
        const siteConfig = {
            EMS: {
                "General": "### Acronyms, Abbreviations, and Terminology\n• **A&O x4:** Alert and Oriented to Time, Place, Person and Situation\n• **AKA / BKA:** Above / Below Knee Amputation\n• **ALOC:** Altered Level Of Consciousness\n• **AMS:** Altered Mental Status\n• **ASE:** Active Shooter Event\n• **BLS / ALS:** Basic / Advanced Life Support\n• **C/O:** Complaint Of\n• **C-Spine:** The upper portion of the spine, consisting of seven vertebrae (C1 to C7) located in the neck\n• **DOA:** Dead On Arrival\n• **EMS:** Emergency Medical Services\n• **EMT:** Emergency Medical Technician\n• **Fx:** Fracture\n• **GCS:** Glasgow Coma Scale\n• **GSW:** Gunshot Wound\n• **HEMS:** Helicopter Emergency Medical Services\n• **ICS:** Intercostal Space\n• **LOC:** Loss of Consciousness\n• **MVA:** Motor Vehicle Accident\n• **MOI:** Mechanism of Injury\n• **PEA:** Pulseless Electrical Activity\n• **PNB:** Pulseless, Not Breathing.\n• **SI / HI:** Suicidal Ideation / Homicidal Ideation\n• **ROLE:** Recognition of Life Extinct\n• **ROSC:** Return of Spontaneous Circulation\n• **TBI:** Traumatic Brain Injury\n• **TOR:** Termination of Resuscitation\n• **TQ:** Tourniquet\n• **VF / VT:** Ventricular Fibrillation / Tachycardia\n---\n### The Glasgow Coma Scale\nThe Glasgow Coma Scale (GCS) is a scoring system used to assess a patient's level of consciousness. It evaluates eye opening, verbal response, and motor response, providing a numerical score to guide clinical decision-making.\n\n**Eye Opening:**\n• **4:** Spontaneous (opens eyes without stimulation)\n• **3:** To speech (opens eyes in response to voice)\n• **2:** To pain (opens eyes in response to painful stimuli)\n• **1:** No response\n\n**Verbal Response:**\n• **5:** Oriented (patient is fully aware of time, place, and person)\n• **4:** Confused (patient speaks but is disoriented or confused)\n• **3:** Inappropriate words (random or inappropriate speech)\n• **2:** Incomprehensible sounds (moaning or unintelligible speech)\n• **1:** No response\n\n**Motor Response:**\n• **6:** Obeys commands (patient follows simple commands)\n• **5:** Localizes pain (purposeful movement towards pain)\n• **4:** Withdraws from pain (pulls away from painful stimuli)\n• **3:** Flexion to pain (decorticate posturing)\n• **2:** Extension to pain (decerebrate posturing)\n• **1:** No response\n\n**How is the GCS Measured?**\n• **GCS Score 15:** Fully alert and responsive (normal)\n• **GCS Score 9-14:** Moderate impairment (indicates varying levels of decreased consciousness)\n• **GCS Score 3-8:** Severe impairment (indicates coma or deep unconscious state)\n---\n### ATMIST Handover Mnemonic\n• **A:** Patient's Age\n• **T:** Time of Incident\n• **M:** Mechanism of Injury\n• **I:** Injuries Found / Suspected\n• **S:** Signs & Symptoms\n• **T:** Treatments Given\n---\n### SAMPLE History Taking Mnemonic\n• **S:** Signs & Symptoms\n• **A:** Allergies\n• **M:** Medications\n• **P:** Past medical history\n• **L:** Last oral intake\n• **E:** Events leading to incident\n---\n### DCAP-BTLS Trauma Physical Exam Mnemonic\n• **D:** Deformities\n• **C:** Contusions\n• **A:** Abrasions\n• **P:** Punctures / Penetrations\n• **B:** Burns\n• **T:** Tenderness\n• **L:** Lacerations\n• **S:** Swelling",
                "Equipment": "**LUCAS Machine**\n<span style='color: #ff4d4d; font-weight: 700;'>MUST NOT BE USED ON PEDIATRIC PATIENTS</span>\nDelivers consistent, high quality chest compressions during cardiac arrest.\n---\n**SAM Splint**\nMalleable aluminum splint for stabilizing fractures and joint injuries.\n---\n**Philips HeartStart Intrepid**\nProvides defibrillation, pacing, and advanced cardiac monitoring in cardiac emergencies.\n---\n**ROYAX Splint**\nRigid splint used for immobilizing long-bone fractures, often with adjustable features.\n---\n**Nasal Cannulas**\nDelivers low-flow oxygen for patients with mild respiratory distress or hypoxia.\n---\n**RISE Splint**\n(Good for Wilderness Medicine)\nCombines Rigid, Immobilizing, Stabilizing Elements for extremity injuries; very lightweight.\n---\n**BVM + NRB**\nProvides assisted ventilation and high-concentration oxygen for apneic or hypoventilating patients.\n---\n**CRAMER Vacuum Splint**\nConforms to the limb when air is evacuated, providing custom rigid immobilization for fractures.\n---\n**HALO Chest Seals**\nUsed to treat open chest wounds (sucking chest wounds) to prevent tension pneumothorax.\n---\n**Pressure Bandage**\nControls moderate to severe external bleeding through direct pressure.\n---\n**SPEAR Needles**\nUsed for needle decompression in suspected tension pneumothorax.\n---\n**Packing Gauze (Incl. Hemostatic)**\nUsed for wound packing in junctional or deep bleeding sites, promoting clotting.\n---\n**I-Gel Advanced Airway**\nSupraglottic airway device for emergency airway management without the need for intubation.\n---\n**CAT Tourniquets**\n<span style='color: #ff4d4d; font-weight: 700;'>MUST NOT BE USED ON HEAD, NECK OR TORSO.</span>\nControls life-threatening extremity hemorrhage when direct pressure fails.\n---\n**Rapid Sequence Intubation Kit**\nFacilitates secure airway placement in critically ill patients using sedatives and paralytics.\n---\n**IV Kit (16g -18g)**\nEstablishes intravenous access for fluid resuscitation, medication, or blood product delivery.\n---\n**Cricothyrotomy Kit**\n<span style='color: #ff4d4d; font-weight: 700;'>MUST NOT BE USED ON PEDIATRIC PATIENTS</span>\nEstablishes a surgical airway in \"can’t intubate, can’t oxygenate\" scenarios.\n---\n**Kendrick Extrication Device**\nStabilizes the spine and torso during extraction of seated trauma patients, especially in MVAs.\n---\n**Nasopharyngeal Airway**\nMaintains airway patency in semi-conscious patients with intact gag reflex.\n---\n**Scoop + Backboard + Collar**\nProvides spinal motion restriction for trauma patients during transport.",
                "Bleeding Control": "### Limbs (Arms and Legs)\n**1.** Apply direct pressure to the wound.\n**2.** Apply a tourniquet (TQ) high and tight on the affected limb.\n**3.** Flush the wound with 0.9% Saline.\n**4.** Pack the wound with hemostatic gauze.\n**5.** Apply an Israeli Pressure Bandage.\n---\n### Junctional Areas (Groin, Axilla, etc.)\n**1.** Apply direct pressure to the wound.\n**2.** Flush the wound with 0.9% Saline.\n**3.** Pack the wound with hemostatic gauze.\n**4.** Apply a SAM Junctional tourniquet.\n**5.** Pump the SAM Junctional Tourniquet until bleeding fully stops.\n---\n### Torso (Chest and Abdomen)\n**1.** Apply direct pressure to the wound (See Below).\n**2.** Do not pack or compress abdominal wounds.\n**3.** For Chest Wounds, apply a HALO vented chest seal.\n**4.** For a Pelvic fracture, apply a pelvic binder at the level of the greater trochanters.\n**5.** Administer TXA, in accordance with Dosages.\n---\n### Neck\n**1.** Apply direct pressure to the wound.\n**2.** Pack the wound with hemostatic gauze, ensuring patient can still breathe.\n**3.** Secure dressing with light pressure (no circumferential wrap).\n**4.** Place a Nasopharyngeal airway to secure the patient's airway.\n**5.** Be prepared to intubate or place an I-Gel if the airway is further obstructed.",
                "Dosages": "### Cardiac Care & Emergencies\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest: 1mg Adrenaline every 3-5 minutes</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest: 1.25mg/kg Lidocaine</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest Post ROSC: 2-10mcg/min continuous IV infusion</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest Shock (Adult): 200 Joules Biphasic</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest Shock (Ped): 2 Joules/kg</span>\n• SVT: 6mg Adenosine, then 12mg if no response. <span style='font-weight: 700;'>MUST BE SALINE FLUSHED</span>\n• Bradycardia (Slow HR): 1mg Atropine every 3-5 minutes (Max 3mg)\n• High Blood Pressure: 5mcg/min Nitroglycerin Drip, increasing by 5mcg/min if required\n• Low Blood Pressure: 0.9% Saline (500mL Bolus)\n---\n### Analgesia & Sedation\n• Analgesia: 50mcg Fentanyl, increasing by 25mcg every 10-15 if required.\n• Analgesia: 0.1mg/kg Morphine, max of 10 per dose\n• Analgesia: 0.3mg/kg Ketamine, increasing by 0.25mg every 20-30 if required.\n• Agitated / Aggressive PT: 5-10mg IM Midazolam\n---\n### Seizure & Neurology\n• Seizure (1st Line): 5mg IV Midazolam\n• Seizure (2nd line): 5-10mg IV Diazepam\n• Stroke: IV tPA 0.9mg/kg (max 90mg), 10% as bolus over 1 minute, then 90% over 60 minutes\n---\n### Respiratory\n• Asthma / COPD: 2.5mg nebulized Albuterol in 3mL NS\n• Asthma / COPD: 0.5mg nebulized Ipratropium Bromide\n• Coughing Blood (Hemoptysis): 1g Tranexamic Acid (TXA) via Nebulizer\n• Respiratory Distress: 2g Magnesium Sulfate over 10-20 min\n---\n### Trauma & Bleeding\n• Major Bleeding: 1g Tranexamic Acid (TXA) in 100mL Saline IV\n• Anaphylaxis (IM): 0.4mg IM Epinephrine 1:1000\n• Antihistamine: 25-50mg IV/IM Diphenhydramine\n---\n### Antibiotics & Toxins\n• Antibiotics: 2g Ceftriaxone in 100mL Saline\n• Antibiotics (Mass casualty or rural): 1g Ertapenem in 100mL Saline\n• Overdose: 2mg Naloxone through nasal spray.\n• TCA Overdose, Hyperkalemia: 1-2 mEq/kg IV bolus Sodium Bicarbonate\n---\n### Metabolic & Electrolytes\n• Hypoglycemia (altered LOC, seizure, collapse): 25g (250mL) IV D10 Dextrose\n• Hypoglycemia (No IV Access): 1mg IM/SubQ Glucagon\n• Hyperkalemia: 10mL of 10% solution IV over 2–5 min Calcium Gluconate\n• Vomiting / Nausea: 4mg Ondansetron\n---\n### Oxygen Therapy\n• Nasal Cannula: 1-6 L/min\n• Simple Face Mask: 6-10 L/min\n• Non-Rebreather Mask (NRB): 10-15 L/min (maxed)\n• Bag-Valve Mask (BVM): 15+ L/min\n• RSI + Ventilator: 6-8 mL/kg (Tidal Volume)",
                "Immobilisation": "### SAM Splint\n**1.** Choose the appropriate length of SAM Splint (long leg, short leg, or arm).\n**2.** Unroll the splint and bend it into the required shape to immobilize the limb.\n**3.** Position the splint above and below the injury site to cover the affected area.\n**4.** Use elastic bandages or triangular bandages to fasten the splint to the limb.\n**5.** After securing, check distal circulation, sensory, and motor function.\n---\n### CRAMER Vacuum Splint\n**1.** Choose the appropriate size of CRAMER Splint (long leg, short leg, or arm).\n**2.** Place the vacuum splint around the injured limb.\n**3.** Start the vacuum process by a vacuum pump to remove air from the splint.\n**4.** Use straps or velcro to further secure the splint.\n**5.** After securing, check distal circulation, sensory, and motor function.\n---\n### RISE Splint (Wilderness / SAR)\n**1.** Unfold the RISE Splint from its folded position.\n**2.** Locate the instructions and confirm the required position for the injury.\n**3.** Fold the RISE Splint using the instructions, along the lines.\n**4.** Secure with a pressure bandage, tape or triangular bandage.\n**5.** After securing, check distal circulation, sensory, and motor function.\n---\n### Pelvic Binder\n**1.** Slide or place the binder under the patient’s pelvis at the level of the greater trochanters (not the iliac crests).\n**2.** Secure the binder snugly around the pelvis, ensuring symmetrical application. Tighten until firm resistance is felt.\n**3.** Fasten straps or Velcro fully. Ensure binder remains midline and does not ride up.\n---\n### Spinal Board\n**1.** First rescuer maintains head and neck in neutral alignment, preventing flexion, extension, or rotation. This is known as Manual In-Line Stabilisation (MILS).\n**2.** Size and fit an appropriately measured rigid cervical collar while MILS is maintained.\n**3.** Place board adjacent to patient, padded if available to reduce pressure points.\n**4.** With ≥3 rescuers: one maintains MILS, two align torso / pelvis / legs. Roll patient as a unit, assess back, then slide board beneath.\n**5.** Roll patient carefully back onto the board while maintaining alignment.\n**6.** Ensure patient’s midline (nose, sternum, umbilicus) is aligned with the board’s centerline.\n**7.** Secure chest, pelvis, and thighs with straps in that order to limit movement.\n**8.** Secure legs/ankles together with straps or bandaging.\n**9.** Apply head blocks or padded supports, then secure forehead and chin straps while maintaining MILS until complete.\n**10.** Reassess airway, breathing, circulation, neurological status, and strap security.\n---\n### Kendrick Extrication Device (KED)\n**1.** First rescuer maintains head and neck in neutral alignment, preventing flexion, extension, or rotation. This is known as Manual In-Line Stabilisation (MILS).\n**2.** Size and fit an appropriately measured rigid cervical collar while MILS is maintained.\n**3.** Have patient sit forward slightly and position the KED device behind the patient’s back, ensuring flaps are free and straps untangled.\n**4.** Slide side panels down between patient and seat; adjust to ensure full torso coverage.\n**5.** Fasten middle strap first, then lower, then upper chest strap (order prevents airway compromise). Do not overtighten yet.\n**6.** Cross and fasten leg straps over thighs for pelvic stability.\n**7.** Place head support pads snugly on either side of the patient’s head.\n**8.** Fasten forehead strap first, then chin strap; confirm neutral alignment.\n**9.** Reassess airway, breathing, circulation, neurological status, and strap security.",
                "Procedures": "### Establishing IV Access\n**1.** Identify a suitable vein, often the Antecubital Fossa, Forearm, or Dorsum of Hand.\n**2.** Place a tourniquet 5-10cm above the site.\n**3.** Sterilise the site with a chlorhexidine swab, moving in a circular motion outwards.\n**4.** Prime saline lock with 0.9% saline.\n**5.** Pull skin taut.\n**6.** Insert the needle at an angle of 20 degrees, bevel up.\n**7.** Confirm flashback in catheter.\n**8.** Advance catheter.\n**9.** Remove the needle.\n**10.** Connect primed saline lock.\n**11.** Release tourniquet.\n**12.** Flush with 5mL of 0.9% Saline.\n---\n### IV Gauges\n• **14G (Orange):** Massive trauma, rapid volume resuscitation, major hemorrhage, emergency surgery.\n• **16G (Grey):** Trauma, major surgery, large-volume fluid replacement, rapid transfusion.\n• **18G (Green):** Standard trauma line, blood transfusion, rapid IV fluids, contrast dye (CT). Very common EMS size.\n• **20G (Pink):** General IV access in adults, medications, fluids, can be used for blood transfusion if needed.\n• **22G (Blue):** Elderly/frail patients, small veins, slower infusions, antibiotics, maintenance fluids.\n• **24G (Yellow):** Pediatrics, neonates, very fragile veins, very slow infusions, antibiotics.\n• **26G (Purple):** Rarely used; neonates and extremely tiny veins.\n---\n### Establishing IO Access\nAn intraosseous (IO) line is a vascular access method where a needle is inserted directly into the bone marrow cavity, allowing rapid delivery of fluids and medications. It is typically used in emergencies when IV access is difficult or impossible.\n**1.** Identify appropriate IO site (proximal tibia, distal tibia or proximal humerus).\n**2.** Sterilise the site with a chlorhexidine swab, moving in a circular motion outwards.\n**3.** Select correct IO needle size based on patient age, weight, and tissue depth.\n**4.** Load the needle set onto the EZ-IO driver.\n**5.** Place needle tip against insertion site at a 90° angle, bevel forward.\n**6.** Drill until a sudden “give” is felt, indicating entry into the medullary space.\n**7.** Remove the EZ-IO driver, leaving the needle in place.\n**8.** Remove the stylet and attach extension set.\n**9.** Aspirate for marrow/blood, then flush with 5–10mL of 0.9% saline.\n**10.** Secure needle with sterile, adhesive dressing.\n**11.** Connect primed IV/IO tubing and begin infusion/medications as indicated.\n---\n### IO Needle Sizes\n• **15mm (Pink):** Pediatric patients (3–39kg), small limbs, minimal soft tissue.\n• **25mm (Blue):** Standard adult IO access (proximal tibia, distal tibia, humerus). Most common EMS size.\n• **45mm (Yellow):** Large adults, obese patients, excessive soft tissue (esp. humeral insertion).\n---\n### SPEAR Needle Decompression\nPerformed to relieve a life-threatening tension pneumothorax.\n**1.** Locate the 2nd intercostal space in the midclavicular line on the affected side.\n**2.** Sterilise the site with a chlorhexidine swab, moving in a circular motion outwards.\n**3.** Insert the SPEAR Needle perpendicular to the chest wall, along the mid-clavicular line, in the 2nd intercostal space.\n**4.** Advance the needle slowly and steadily towards the pleural cavity.\n**5.** Advance the catheter to the hub while leaving the needle in place.\n**6.** Wait 5-10 Seconds.\n**7.** Remove the needle, leaving the catheter in place.\n**8.** Check the catheter every 3-4 minutes for potential clogging or air occlusion.\n**9.** If clogged, rotate it 1/4 turn to loosen any debris or obstruction.\n**10.** If still clogged, flush with 10cc of saline.\n---\n### Rapid Sequence Intubation (RSI)\nUsed to secure an airway in critically ill or injured patients by administering an induction agent and a paralytic in rapid succession.\n**1.** Aspirate the ET Tube to ensure it is clear and unobstructed.\n**2.** Prepare NPA (Nasopharyngeal Airway) and OPA (Oropharyngeal Airway).\n**3.** Prepare Laryngoscope.\n**4.** Prepare ET Tube.\n**5.** Prepare bougie.\n**6.** Prepare syringe (10cc).\n**7.** Push 1.5mg/kg IV Ketamine, at a maximum of 100mg.\n**8.** Push 1.0mg/kg IV Rocuronium, at a maximum of 100mg.\n**9.** Insert Laryngoscope, visualising the vocal cords and achieving a grade 1/2 view.\n**10.** Insert ET tube and advance 2-3cm past the vocal cords.\n**11.** Remove the bougie / stylet.\n**12.** Inflate cuff with 10cc syringe.\n**13.** Attach EtCo2 monitor, observing change from yellow to purple.\n**14.** Observe bilateral chest rise, auscultation of breath sounds.\n**15.** Secure ET Tube.\n**16.** Attach to ventilator or BVM.\n---\n### I-Gel Advanced Airway\n**1.** Confirm that the patient is unresponsive or has no gag reflex.\n**2.** Choose appropriate I-Gel size.\n**3.** Apply a water-based lubricant to the posterior surface of the I-Gel.\n**4.** Hold the I-Gel like a pen and insert into the mouth, advancing along the hard palate until definitive resistance is felt.\n**5.** Confirm proper chest rise, auscultate breath sounds bilaterally, and attach an EtCO₂ detector.\n**6.** Use an I-Gel securing strap or tape the device securely in place.\n**7.** Begin ventilating immediately with 100% oxygen, as outlined in #dosages.\n---\n### CONTROL-CRIC (Emergency Cricothyrotomy)\n<span style='color: #ff4d4d; font-weight: 700;'>CRITICAL LAST-RESORT AIRWAY INTERVENTION</span>\n**1.** Palpate and identify the cricothyroid membrane between the thyroid and cricoid cartilage.\n**2.** Mark the location using a cap marker or skin pen if available.\n**3.** Using a scalpel, make a vertical skin incision (approx. 3cm) over the membrane.\n**4.** Spread tissue and make a horizontal incision through the cricothyroid membrane.\n**5.** Insert the tracheal hook, applying upward traction on the thyroid cartilage to expose the airway.\n**6.** Insert the CRIC-KEY (tracheostomy tube with bougie-stiffener) through the incision.\n**7.** Withdraw the tracheal hook by rotating it laterally and lifting out carefully.\n**8.** Remove the introducer/bougie from the CRIC-KEY once confirmed inside the trachea.\n**9.** Inflate the cuff with a 10cc syringe.\n**10.** Secure tube.\n**11.** Attach to an oxygen source ventilator and confirm placement with a capnograph.\n---\n### Chest Tube Thoracostomy\n**1.** Locate the 5th intercostal space along the mid-axillary line on the affected side.\n**2.** Sterilise the site with a chlorhexidine swab, moving in a circular motion outwards.\n**3.** Make a vertical incision (approx. 3cm) over the fifth intercostal space, cutting through skin and subcutaneous tissue.\n**4.** Use a Kelly hemostat to spread the muscle fibers and expose the pleura.\n**5.** Insert index finger through the opening to confirm pleural space has been reached.\n**6.** A rush of air or blood will confirm successful decompression. Sweep the cavity with a finger to clear clots.\n**7.** Insert a 28-36 French tube along hemostat, into the space.\n**8.** Attach the tube to a Heimlich valve.\n**9.** Confirm placement by checking for fogging in the tube, symmetrical chest rise, and improved lung sounds.\n---\n### Burn Protocols\n**1.** Douse burns in cool water or saline soaked gauze.\n**2(a).** Place patient on high-flow O2 via NRB at 15L/min.\n**2(b).** If patient has severe maxillofacial burns, consider an RSI, I-GEL or, in extreme scenarios, a cricothyrotomy.\n**3.** Remove restrictive items.\n**4.** Apply Water-Jel burn dressings.\n**5.** Wrap with dry sterile gauze.\n**6.** Cover with burn sheet.\n**If over 20% TBSA Burned, continue:**\n**7.** Administer 0.9% Saline (500mL Bolus).\n**8.** Use formula: 4mL x Body Weight (kg) x TBSA (%) / 2.\n**9.** Push 50mcg Fentanyl for pain.\n---\n### Rapid Field Blood Transfusion (RFBT)\n**1.** Remove O-Negative blood from insulated storage.\n**2.** Confirm expiry date, blood type, and temperature.\n**3.** Attach a blood administration set with an integrated filter, and a pressure infuser bag.\n**4.** Establish large bore IV (14-16 Gauge).\n**5.** Prime tubing and connect blood administration set to bag.\n**6.** Attach the primed tubing to the patient's IV line.\n**7.** Place the blood bag into the pressure infuser and inflate it to a pressure of 300mmHg.\n**8.** Closely monitor the patient for transfusion reactions. If a reaction occurs, clamp the line immediately.\n---\n### Smoke Inhalation\n• **1.** Place patient on high flow oxygen via NRB, 10-15L/min.\n• **2.** Administer nebulized albuterol in doses of 2.5mg to 5.0mg in 3mL of normal saline.\n• **3.** In severe swelling, perform an RSI.\n---\n### Resuscitative Emergency Thoracotomy\nAn incision made between the ribs in order to access the Heart in the event of traumatic cardiac arrest (TCA) or suspected cardiac tamponade following penetrating chest trauma.\n**1.** Make an incision along the 4th or 5th intercostal space, extending from the sternum to the mid-axillary line (Anterolateral Thoracotomy).\n**2.** Cut through intercostal muscles and pleura to expose the chest cavity.\n**3.** Place a finochietto rib spreader to open the chest wall wide.\n**4.** Manually identify the pericardium. If tense and blue (indicating Tamponade), carefully use scissors to make an incision and release trapped blood.\n**5.** Evacuate clots, identify cardiac lacerations, and control myocardial hemorrhage with digital pressure or staples.\n**6.** Begin internal direct cardiac massage if the patient is in arrest.",
                "Observations": "### Respiratory Rate\n• **0-1 Years:** 30-60 Breaths Per Minute\n• **1-10 Years:** 20-30 Breaths Per Minute\n• **10-20 Years:** 12-20 Breaths Per Minute\n• **20-60 Years:** 12-20 Breaths Per Minute\n• **60+ Years:** 12-25 Breaths Per Minute\n---\n### Heart Rate\n• **0-1 Years:** 100-160 Beats Per Minute\n• **1-10 Years:** 70-130 Beats Per Minute\n• **10+ Years:** 60-100 Beats Per Minute\n---\n### Blood Pressure (Hypotensive / Normal / Hypertensive)\n• **0-1 Years:**\n  - Hypotensive: <70 systolic\n  - Normal: ~80/45\n  - Hypertensive: >100/65\n• **1-10 Years:**\n  - Hypotensive: <70 + (2 × age in years)\n  - Normal: ~90/55\n  - Hypertensive: >110/75\n• **10-20 Years:**\n  - Hypotensive: <90 systolic\n  - Normal: ~110/70\n  - Hypertensive: >130/80\n• **20-40 Years:**\n  - Hypotensive: <90 systolic\n  - Normal: ~120/80\n  - Hypertensive: >130–139 / >80–89 (Stage 1 HTN)\n• **40-60 Years:**\n  - Hypotensive: <90 systolic\n  - Normal: ~125/80\n  - Hypertensive: >140/90\n• **60-80 Years:**\n  - Hypotensive: <100 systolic\n  - Normal: ~130/80\n  - Hypertensive: >150/90\n• **80+ Years:**\n  - Hypotensive: <100 systolic\n  - Normal: ~135/85\n  - Hypertensive: >160/90\n---\n### Concussions\n**Indicators:**\n• Confusion / Disorientation.\n• Headache (Most Common).\n• Difficulty Remembering Prior Events.\n• Dizziness / Lightheadedness.\n• Repeating Questions\n• Nausea or Vomiting.\n• Trouble Concentrating.\n• Blurred or Double Vision.\n• Mental Fog.\n• Sensitivity to Light or Noise.\n• Delayed Responses.\n• Balance or Coordination Issues.\n\n**Treatment Steps:**\n**1.** Stabilise C-Spine if MOI is traumatic.\n**2.** Assess using GCS.\n**3.** Determine level of consciousness.\n**4.** Minimise stimulation (Light, Sound).\n**5.** Do not administer sedatives.\n**6.** Place on high flow oxygen.\n**7.** Prevent hyperventilation.",
