<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay Assistant</title>
    <style>
        /* Liquid Glass Design Tokens */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-bg-active: rgba(255, 255, 255, 0.18);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-border-glow: rgba(255, 255, 255, 0.4);
            --text-color: #ffffff;
            --radius: 20px;
            --radius-sm: 10px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            color: var(--text-color);
        }

        body {
            /* Loads your uploaded repository image */
            background: url('Background for WB') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* Glassmorphism Panel Base style */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-radius: var(--radius);
        }

        .controls {
            display: flex;
            align-items: center;
        }

        /* Shortened, Arrowless Timezone Select */
        .tz-wrapper {
            position: relative;
            display: inline-block;
        }

        select {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            appearance: none; /* Removes native arrow */
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 75px; /* Keeps it short */
        }

        select:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-glow);
        }

        #clock {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Main Workspace Layout */
        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            overflow: hidden;
        }

        /* Left Sidebar Nav */
        nav {
            width: 260px;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .main-cats {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
        }

        .main-cats button {
            flex: 1;
            text-align: center;
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 8px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
        }

        .main-cats button:hover {
            background: var(--glass-bg-hover);
        }

        .main-cats button.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .sub-nav-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            list-style: none;
        }

        .sub-nav-item {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
        }

        .sub-nav-item:hover {
            background: var(--glass-bg-hover);
        }

        .sub-nav-item.active {
            background: var(--glass-bg-active);
            border-left: 3px solid #ffffff;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-weight: 600;
        }

        /* Content Display Window */
        main {
            flex: 1;
            border-radius: var(--radius);
            padding: 36px;
            overflow-y: auto;
        }

        main h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Formatting elements inside the main display */
        .content-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .content-subheading {
            font-size: 18px;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        
        .content-divider {
            border: 0;
            border-top: 1px solid var(--glass-border);
            margin: 22px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header class="glass-panel">
        <div id="clock">Loading Time...</div>
        <div class="controls">
            <div class="tz-wrapper">
                <select id="timezone-select">
                    <option value="local">LOC</option>
                    <option value="UTC">UTC</option>
                    <option value="America/New_York">EST</option>
                    <option value="America/Los_Angeles">PST</option>
                    <option value="Europe/London">GMT</option>
                </select>
            </div>
        </div>
    </header>

    <div class="workspace">
        <nav class="glass-panel">
            <div class="main-cats">
                <button id="btn-EMS" onclick="switchMainPage('EMS')">EMS</button>
                <button id="btn-Fire" onclick="switchMainPage('Fire')">Fire</button>
                <button id="btn-LEO" onclick="switchMainPage('LEO')">LEO</button>
            </div>
            <ul class="sub-nav-list" id="sub-nav-container">
                </ul>
        </nav>

        <main class="glass-panel">
            <h1 id="content-title">Welcome</h1>
            <div id="content-body">Select a department and subpage to begin.</div>
        </main>
    </div>

    <script>
        // --- EASY TO EDIT CONFIGURATION ---
        // Rules:
        // 1. A line containing ONLY '---' creates a clean glass divider line.
        // 2. A line starting with '### ' immediately following a divider creates a subheading.
        const siteConfig = {
            EMS: {
                "Equipment": "• Jump Bag\n• Defibrillator (AED)\n---\n### Optional Items\n• Portable Oxygen\n• Stretcher & Cervical Collars",
                "Bleeding Control": "1. Apply direct pressure with sterile dressing.\n2. If bleeding continues, apply a tourniquet high and tight.\n---\n### Deep Trauma Instructions\n3. Pack deep wounds with hemostatic gauze.\n4. Keep patient warm and monitor for shock.",
                "Dosages": "• Epinephrine (1:1,000): 0.3mg IM for Anaphylaxis\n• Naloxone (Narcan): 2mg Intranasal for Opioid Overdose\n---\n### Cardiac & Respiratory\n• Aspirin: 324mg chewed for Chest Pain\n• Albuterol: 2.5mg via Nebulizer for Asthma"
            },
            Fire: {
                "Equipment": "• Halligan Bar & Axe\n• SCBA (Self-Contained Breathing Apparatus)\n---\n### Visual Systems\n• Thermal Imaging Camera (TIC)\n• Fire Hoses (1.75\" and 2.5\")",
                "Fire Suppress": "• Class A: Ordinary combustibles (Water, Foam)\n• Class B: Flammable liquids (CO2, Dry Chemical)\n---\n### Specialty Responses\n• Class C: Electrical fires (Turn off power, CO2)\n• Class D: Combustible metals (Special Dry Powder)",
                "Hazmat": "• Zone Setup: Hot Zone (Exclusion), Warm Zone (Decon), Cold Zone (Command).\n---\n### References\n• Consult ERG (Emergency Response Guidebook) for identification placards."
            },
            LEO: {
                "Equipment": "• Duty Belt & Holster\n• Body Worn Camera (BWC)\n---\n### Protective Wear\n• Ballistic Vest\n• Less-Lethal (Taser, OC Spray, Baton)",
                "Miranda Rights": "\"You have the right to remain silent.\nAnything you say can and will be used against you in a court of law.\n---\n### Right to Counsel\nYou have the right to an attorney...\"",
                "Codes": "• 10-4: Acknowledged\n• 10-7: Out of Service\n• 10-8: In Service\n---\n### Emergency Dispatch\n• 10-20: Location\n• Code 3: Emergency Response (Lights & Sirens)"
            }
        };

        let currentMain = 'EMS';
        let currentTimezone = 'local';

        // --- CLOCK CONFIGURATION ---
        function updateClock() {
            const now = new Date();
            const options = {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            };
            
            if (currentTimezone !== 'local') {
                options.timeZone = currentTimezone;
            }

            document.getElementById('clock').innerText = new Intl.DateTimeFormat('en-US', options).format(now);
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('timezone-select').addEventListener('change', (e) => {
            currentTimezone = e.target.value;
            updateClock();
        });

        // --- PAGE ROUTING & DOM PARSING LOGIC ---
        function switchMainPage(category) {
            currentMain = category;
            
            ['EMS', 'Fire', 'LEO'].forEach(cat => {
                document.getElementById(`btn-${cat}`).classList.toggle('active', cat === category);
            });

            renderSubNav();
        }

        function renderSubNav() {
            const container = document.getElementById('sub-nav-container');
            container.innerHTML = ''; 
            
            const subpages = Object.keys(siteConfig[currentMain]);
            
            subpages.forEach((subpage, index) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = 'sub-nav-item';
                btn.innerText = subpage;
                btn.onclick = () => displayContent(subpage);
                
                li.appendChild(btn);
                container.appendChild(li);

                if (index === 0) {
                    displayContent(subpage);
                }
            });
        }

        function displayContent(subpageKey) {
            document.querySelectorAll('.sub-nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === subpageKey);
            });

            // Set Title text
            document.getElementById('content-title').innerText = `${currentMain} - ${subpageKey}`;
            
            const rawText = siteConfig[currentMain][subpageKey];
            const contentBody = document.getElementById('content-body');
            contentBody.innerHTML = ''; 

            // Feature 1: Always inject a default divider right below the main panel header
            const defaultHr = document.createElement('hr');
            defaultHr.className = 'content-divider';
            contentBody.appendChild(defaultHr);

            // Process text block line by line
            const lines = rawText.split('\n');
            lines.forEach(line => {
                const trimmed = line.trim();
                
                if (trimmed === '---') {
                    // Feature 2: Standard Divider implementation
                    const hr = document.createElement('hr');
                    hr.className = 'content-divider';
                    contentBody.appendChild(hr);
                } else if (trimmed.startsWith('### ')) {
                    // Feature 3: Subheading implementation
                    const subHeading = document.createElement('div');
                    subHeading.className = 'content-subheading';
                    subHeading.innerText = trimmed.replace('### ', '');
                    contentBody.appendChild(subHeading);
                } else {
                    // Normal text line
                    const div = document.createElement('div');
                    div.className = 'content-line';
                    div.innerText = line;
                    contentBody.appendChild(div);
                }
            });
        }

        // Initialize App
        switchMainPage('EMS');
    </script>
</body>
</html>
