                "Proprietary Offences Act": "### 1. Failure to Comply with a Direction to Leave Land\n**1.** A person who trespasses, who after being directed refuses to leave the land is guilty of an offence.\n**2.** A constable may, without warrant, arrest a person they reasonably believe to be guilty of an offence under this section providing—\n  - (a) the constable has issued a direction to leave the land, and\n  - (b) the person has either refused to comply, or\n  - (c) returned to the land within thirty minutes of the initial directions.\n**3.** Failure to comply with a direction to leave land shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 2. Aggravated Trespass\n**1.** A person commits the offence of aggravated trespass if he trespasses on land and, in relation to any lawful activity which persons are engaging in or are about to engage in on that or adjoining land, does there anything which is intended by him to have the effect—\n  - (a) of intimidating those persons or any of them so as to deter them or any of them from engaging in that activity;\n  - (b) of obstructing that activity; or\n  - (c) of disrupting that activity.\n**2.** For the purposes of this section \"land\" does not include public roads and the public highway.\n**3.** Aggravated trespass shall be classified as an offence worthy of a lawful arrest.\n---\n### 3. Theft\n**1.** A person, who dishonestly appropriates property belonging to another with the intention of permanently depriving the other of it, is guilty of an offence.\n**2.** It is immaterial whether the appropriation is made with a view to gain, or is made for the thief's own benefit.\n**3.** For the purposes of this section, a person's appropriation is not to be regarded as dishonest—\n  - (a) if he appropriates the property in the belief that he has in law the right to deprive the other of it,\n  - (b) if he appropriates the property in the belief that he would have the other's consent if the other knew of the appropriation and the circumstances of it, or\n  - (c) if the property was acquired through a lawful transaction.\n**4.** For the purposes of this section, an appropriation is—\n  - (a) any assumption by a person of the rights of an owner, or\n  - (b) where property is lawfully handed over on a temporary basis, with the person later assuming the permanent rights of an owner.\n**5.** Property includes money and all other property, real or personal, including things in action and other intangible property.\n**6.** Theft shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 3a. Equipped to Steal\n**1.** A person commits an offence if, when found in a public place or on private property without lawful authority, they have with them any article—\n  - (a) made, adapted, or intended for use in the course of committing theft; or\n  - (b) intended by the person for use in the course of committing theft.\n**2.** For the purposes of this section, articles include but are not limited to—\n  - (a) lock-picking devices;\n  - (b) electric drills not in a work setting, bolt cutters, or similar tools;\n  - (c) gloves, masks, or clothing adapted to conceal identity when considered with other circumstances;\n  - (d) electronic devices adapted for bypassing security systems or cards equipped with RFID (Radio Frequency Identification) chips unlawfully created or possessed to bypass a security system.\n**3.** A constable may exercise stop and search powers under the Police and Criminal Evidence Act 2025 where they have reasonable suspicion, based on objective and articulable facts, that a person is committing, has committed, or is about to commit an offence under this section.\n**4.** It shall not be necessary for the prosecution to prove that a theft has been committed, or that a specific property was targeted.\n**5.** A constable may, without warrant, arrest a person they reasonably believe to be guilty of an offence under this section.\n**6.** Being equipped to steal shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 4. Trespass of a Protected Site\n**1.** For the purposes of this Act, a \"protected site\" shall include any land, building, or area designated under one of the following categories—\n  - (a) Crown Residencies, Sites owned or occupied by the Crown, including but not limited to: (i) Clayton Palace, (ii) Other sites designated by the HM Government or the Monarch;\n  - (b) Military Installation Sites, Any site operated, owned, or controlled by the Ministry of Defence, including but not limited to: (i) Westbridge Reserve Centre, (ii) Other MoD Sites as listed by the HM Government;\n  - (c) Government Sites, Buildings or areas used for governmental purposes, including but not limited to: (i) Westmorland House, (ii) Other sites specifically designated by the Prime Minister in agreement with their permanent counterpart;\n  - (d) National Security Installations, including but not limited to: (i) Regional Resilience Centre, (ii) Other sites specifically designated by the Prime Minister in agreement with their permanent counterpart.\n---\n### 4a. Offence of Trespass on a Protected Site\n**1.** A person commits the offence of Trespass of a Protected Site if they enter, or remain upon, a protected site without lawful authority.\n**2.** The offence of trespass has not been committed if the Protected Site is not explicitly listed in this Act, or has not been designated by the appropriate authority listed in Section 4(1)(a)(ii),(b)(ii),(c)(ii),(d)(ii).\n**3.** Signage indicating restricted access must be displayed at protected sites, except where a site is explicitly designated under §3A(ii) by HM Government.\n**4.** This offence does not apply to activity conducted on public highways adjacent to or passing through protected sites.\n**5.** Trespass of a protected site shall be classified as an offence worthy of a lawful arrest, or a fixed penalty notice not exceeding £2,000.\n---\n### 4b. Authorised Persons\n**1. Military Installation Sites:**\n  - (a) At sites such as Westbridge Reserve Centre, only the following persons are authorised to enter unless otherwise directed by the Chief of Defence Staff: (i) All members of British Armed Forces; (ii) Any Police Constable, without the need for prior authorisation, where it is strictly necessary and required to prevent the imminent commission of a criminal offence under any Act or during an emergency circumstance which is posing serious threat to life or damage to property; 1) Such authority shall be revoked immediately once the emergency or imminent risk to the commission of a crime has surpassed, and the Constable on the installation must comply immediately when directed by any Military authority; (iii) The Prime Minister; (iv) The Ministry of Defence Police; (v) Members of the London Ambulance Service without the need for prior authorisation where it is absolutely necessary during an emergency circumstance to save a life; (vi) Members of the London Fire Brigade without the need for prior authorisation where it is absolutely necessary during an emergency circumstance to save a life or prevent serious damage to property; or (vii) Individuals given express authority from a Commissioned Officer.\n  - (b) At such sites, the following people are permitted to request any person (excluding members of the British Armed Forces) to leave the site: (i) The Chief Of Defence Staff; (ii) Commissioned Officers; (iii) The Prime Minister.\n**2. Government Sites:**\n  - (a) At sites such as Westmorland House, authorised entry is limited to: (i) Members of the HM Government; (ii) Members of the Home Office; (iii) Metropolitan Police Service Parliamentary and Diplomatic Protection Group; (iv) Metropolitan Police Service Special Escort Group; (v) Any Police Constable Exercising a Lawful Duty; or (vi) Individuals given express authority by; or 1) The Monarch; or 2) The HM Government; (vii) Members of the Ministry of Justice.\n  - (b) At such sites, the following people are permitted to remove any person (excluding members of the HM Government) from the site: (i) Members of the HM Government; (ii) Members of the Home Office; (iii) A Metropolitan Police Service Superintendent or greater authority.\n  - (c) On this site, the Metropolitan Police Service Gold Command will retain primary power over the site, not including against the HM Government.\n**3. Crown Residencies:**\n  - (a) At sites such as Clayton Palace, authorised entry is limited to: (i) Members of the Royal Family; (ii) Members of the British Armed Forces; (iii) The Royal Household; (iv) Metropolitan Police Service Royalty & Specialist Protection; (v) Any Police Constable, without the need for prior authorisation, where it is strictly necessary and required to prevent the imminent commission of a criminal offence under any Act or during an emergency circumstance which is posing serious threat to life or damage to property; 1) Such authority shall be revoked immediately once the emergency or imminent risk to the commission of a crime has surpassed, and the Constable on the installation must comply immediately when directed by any lawfully authorised authority on the site; (vi) Individuals given authority from the Monarch or other Royals.\n  - (b) At such sites, the following people are permitted to remove any person with lawful authority (excluding members of the Royal Family) from the site: (i) Members of the Royal Family; (ii) The Royal Household; (iii) A Metropolitan Police Service Superintendent or greater in uniform, or a person acting on the behalf of a Superintendent; 1) a Metropolitan Police Service Deputy Assistant Commissioner or greater may also overrule any decision to remove any individual from the site notwithstanding chain of command.\n**4. National Security Installations:**\n  - (a) At National Security installations sites such as Regional Resilience Centre, authorised entry is limited to: (i) A Metropolitan Police Service Inspector or greater (not authority); 1) This shall only apply to the Regional Resilience Centre; (ii) The respective organisation/group/team which spawns at such installation.\n**5.** This section, does not in any way, repeal the legal powers a Police Constable has to enter a site to make an arrest or other grounds to enter a property as defined in the Police and Criminal Evidence Act 2025.\n---\n### 4c. Obstruction of a Police Constable Conducting Lawful Duties on a Protected Site\n**1.** It shall be an offence to obstruct a Constable as per authorised in Section 4b on the particular site, conducting lawful duties on a protected site, or in the locality of any protected site. \"Obstruction\" includes but is not limited to—\n  - (a) refusal to provide identification upon attempt to enter the site;\n  - (b) providing false or misleading information; or\n  - (c) physical obstruction.\n**2.** An offence under this section shall be punishable by—\n  - (a) a lawful arrest for Obstruction of a Police Constable on a Protected Site;\n  - (b) a fixed penalty notice not exceeding £1,500;\n  - (i) or both.\n---\n### 5. Taking a Motor Vehicle Without Authority\n**1.** A person who takes a motor vehicle, in a manner which can be reasonably described as an act of theft, and drives it or allows himself to be carried in or on it, is guilty of an offence.\n**2.** For the purposes of this section \"motor vehicle\" shall refer to a mechanically propelled vehicle, including but not limited to motorbikes, cars, buses and motor boats.\n**3.** Taking a motor vehicle without authority shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 6. Robbery\n**1.** A person who performs an act of theft, and immediately before, or at the time of doing so, and in order to do so, uses force on any person or puts or seeks to put any person in fear of being then and there subjected to force, is guilty of an offence.\n**2.** Robbery shall be classified as a summary offence.\n---\n### 7. Criminal Damage\n**1.** A person who causes unlawful damage to the property of another, whilst being aware that unreasonable risk of damage is present, is guilty of an offence.\n**2.** For the purposes of this section, property must be tangible, but that damage done to it need not be.\n**3.** Damage shall be unlawful if it is not done in a manner that can reasonably be assumed to be necessary to prevent the further committing of offences.\n**4.** Criminal damage shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 8. Arson\n**1.** An offence committed under this Section where an act of criminal damage has been committed with the involved use of fire, intending to destroy such property or being reckless as to whether such property would be damaged or destroyed by means of fire, shall be classed as arson.\n  - (a) Admins, or any on-duty employees of the London Fire Brigade, utilising the \"Fire Placer Tool\" are to be made an exception to this and are not to be held accountable for arson.\n**2.** For the purposes of this section, property must be tangible, but that damage done to it need not be.\n**3.** Arson shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 9. Making Off Without Payment\n**1.** Subject to subsection (3) below, a person who, knowing that payment on the spot for any goods supplied or service done is required or expected from him, dishonestly makes off without having paid as required or expected and with intent to avoid payment of the amount due shall be guilty of an offence.\n**2.** For purposes of this section \"payment on the spot\" includes payment at the time of collecting goods on which work has been done or in respect of which service has been provided.\n**3.** Subsection (1) above shall not apply where the supply of the goods or the doing of the service is contrary to law, or where the service done is such that payment is not legally enforceable.\n**4.** Making off without payment shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 10. Interpretation\n**1.** For the purposes of this petition—\n  - (a) \"trespass\" shall be the act of entering land without consent, or\n  - (b) \"land\" shall constitute either, private property, or publicly owned property which is reasonably restricted.\n---\n### 11. Procedure\n**1.** A police constable may arrest without warrant any person guilty of any offence outlined in this Act.\n**2.** Any mentioning of \"members of\" shall apply only to the team which the individual is currently lawfully on, notwithstanding terms such as His Majesty or the Monarch.\n**3.** Any mentioning of \"Police Constables\" or \"Constables\" shall apply only to if the individual is on the police team or has special authority.\"",
    "Public Order Offences Act": "### 1. Riot\n**1.** Where six or more persons, present together, use or threaten unlawful violence for a common purpose and the conduct of them (taken together) is such as would cause a reasonable person present at the scene to fear for his personal safety, each of the persons using unlawful violence for the common purpose is guilty of an offence.\n**2.** It is immaterial whether or not the six persons threaten unlawful violence simultaneously.\n**3.** Common purpose may be inferred from conduct.\n**4.** No reasonable firmness need actually be, or be likely to be, present at the scene.\n**5.** Riot may be committed in private as well as in public places.\n**6.** A constable may arrest without warrant anyone he reasonably suspects is committing an offence under this section.\n**7.** Rioting shall be classified as an offence worthy of a lawful arrest.\n---\n### 2. Violent Disorder\n**1.** Where three or more persons, present together, use or threaten unlawful violence for a common purpose and the conduct of them (taken together) is such as would cause a reasonable person present at the scene to fear for his personal safety, each of the persons using unlawful violence for the common purpose is guilty of an offence.\n**2.** It is immaterial whether or not the six persons threaten unlawful violence simultaneously.\n**3.** Common purpose may be inferred from conduct.\n**4.** No reasonable firmness need actually be, or be likely to be, present at the scene.\n**5.** Riot may be committed in private as well as in public places.\n**6.** A constable may arrest without warrant anyone he reasonably suspects is committing an offence under this section.\n**7.** Violent disorder shall be classified as an offence worthy of a lawful arrest.\n---\n### 3. Affray\n**1.** A person is guilty of an offence if he uses or threatens unlawful violence towards another and his conduct is such as would cause a reasonable person present at the scene to fear for his personal safety.\n**2.** For the purposes of this section a threat cannot be made through the use of words alone.\n**3.** No reasonable person need actually be, or be likely to be, present at the scene.\n**4.** Affray may be committed in private as well as in public places.\n**5.** A constable may arrest without warrant anyone he reasonably suspects is committing an offence under this section.\n**6.** Affray shall be classified as an offence worthy of a lawful arrest.\n---\n### 4. Provocation of Violence\n**1.** A person is guilty of an offence if he—\n  - (a) uses towards another person threatening, abusive or insulting words or behaviour, or\n  - (b) distributes or displays to another person any writing, sign or other visible representation which is threatening, abusive or insulting,\n\nwith intent to cause that person to believe that immediate unlawful violence will be used against him or another by any person, or to provoke the immediate use of unlawful violence by that person or another, or whereby that person is likely to believe that such violence will be used or it is likely that such violence will be provoked.\n**2.** An offence under this section may be committed in a public or private place.\n**3.** A constable may arrest without warrant anyone he reasonably suspects is committing an offence under this section.\n**4.** Provocation of violence shall be classified as an offence worthy of a lawful arrest.\n---\n### 5. Harassment, Alarm, or Distress\n**1.** A person is guilty of an offence if he—\n  - (a) uses towards another person threatening, abusive or insulting words or behaviour, or\n  - (b) distributes or displays to another person any writing, sign or other visible representation which is threatening, abusive or insulting,\n\nwithin the hearing or sight of a person likely to be caused, harassment, alarm or distress thereby.\n**2.** An offence under this section may be committed in a public or a private place.\n**3.** It is a defence for the accused to prove—\n  - (a) that he had no reason to believe that there was any person within hearing or sight who was likely to be caused harassment, alarm or distress, or\n  - (b) that his conduct was reasonable.\n**4.** A constable may arrest a person without warrant if—\n  - (a) he engages in offensive conduct which the constable warns him to stop, and\n  - (b) he engages in further offensive conduct immediately or shortly after the warning.\n**5.** In subsection (4) \"offensive conduct\" refers to conduct that the constable reasonably suspects to constitute an offence under this section, and the further conduct need not be of the same nature to the prior conduct.\n**6.** Harassment, alarm or distress shall be classified as an offence worthy of a lawful arrest.\n---\n### 6. Wasting Emergency Services Time\n**1.** A person is guilty of an offence if they cause the wasteful employment of the emergency services by knowingly making, to any person, a false report.\n**2.** For the purposes of this section, emergency services shall be defined as:\n  - (a) the Metropolitan Police Service, or\n  - (b) the London Ambulance Service, or\n  - (c) the London Fire Brigade, or\n  - (d) the Royal Military Police.\n**3.** For a report to be false under this section, it must—\n  - (a) falsely show that a criminal offence has been committed, or\n  - (b) creates apprehension for the safety of any persons or property, or\n  - (c) falsely indicate that they have information available for a police investigation, or\n  - (d) making repeated reports and/or calls to the emergency services where they are knowingly aware no such emergency exists and is doing so for the purpose of initiating an unnecessary emergency response.\n**4.** Wasting of emergency services time shall be classified as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 7. Impersonation\n**1.** Any person who, with intent to deceive, impersonates a public servant, or makes any statement or does any act calculated to falsely suggest that he is a public servant, shall be guilty of an offence.\n**2.** Any person, not being a public servant, wears any article of uniform in circumstances where it gives him an appearance of resembling a public servant shall be guilty of an offence.\n**3.** In this section public servants shall refer to employment within a state owned police force, fire service, ambulance service, armed forces or security services.\n**4.** Impersonation shall be classed as an offence worthy of a fixed penalty notice or lawful arrest.\n---\n### 8. Obstructing and/or Hindering Emergency Workers in Emergency Circumstances\n**1.** Any person who resists or wilfully obstructs a constable in the execution of his duty, or a person assisting a constable in the execution of his duty, shall be guilty of an offence.\n**2.** A person who, without reasonable excuse, obstructs or hinders another while that other person is acting and responding to an emergency in a capacity mentioned in subsection (3) below, commits an offence.\n**3.** The capacity referred to in subsection (2) is:\n  - (a) A person employed with a fire and rescue authority, or\n  - (b) A person employed within an ambulance service, or\n  - (c) A person employed within a police constabulary, or\n  - (d) A person employed within the Royal Military Police.\n**4.** For the purposes of this act, a person is responding to emergency circumstances if the person;\n  - (a) Is going anywhere for the purpose of dealing with an emergency circumstance at that location, or\n  - (b) Is dealing with emergency circumstances or preparing to do so.\n**5.** For the purposes of this act, an emergency circumstance is a circumstance if they are present or imminent and;\n  - (a) are causing or likely to cause; (i) serious injury to, or serious illness of, a person, or (ii) serious harm to any building or other property, or (iii) a worsening of any such injury, illness or harm, or (iv) an impending danger to members of the public, or (v) the death of a person.\n**6.** Obstructing and/or hindering an emergency worker shall be classed as an offence worthy of a lawful arrest.\n---\n### 9. Protection of Vulnerable Persons\n**1.** An Inspector, or a Constable acting on the behalf of an Inspector, may detain a person where he reasonably believes that—\n  - (a) the person is suffering from a mental disorder, cognitive impairment, dementia, or any other condition affecting their capacity to make decisions concerning their own safety; and\n  - (b) the person presents an immediate risk of serious harm to themselves or to another person.\n**2.** A constable may also detain a person where he reasonably believes that—\n  - (a) the person, by reason of advanced age, illness, infirmity, or vulnerability, is unable to adequately safeguard their own welfare; and\n  - (b) detention is necessary to prevent serious injury, death, neglect, exploitation, or other significant harm.\n**3.** A person detained under this section may be removed to—\n  - (a) a hospital;\n  - (b) a medical facility;\n  - (c) a place of safety; or\n  - (d) any other suitable location approved by the relevant authority for the assessment and protection of vulnerable persons.\n**4.** A person detained under this section shall be held only for so long as is reasonably necessary for—\n  - (a) a medical assessment to be conducted;\n  - (b) appropriate safeguarding measures to be arranged; or\n  - (c) the risk of harm to be sufficiently reduced.\n**5.** Where reasonably practicable, a constable shall notify a family member, guardian, carer, or other appropriate responsible person of the detention.\n**6.** Nothing in this section shall authorise the detention of a person solely on the grounds of age, disability, mental disorder, or unusual behaviour in the absence of a reasonable belief that the conditions in subsection (1) or (2) are satisfied.\n---\n### 10. Procedure\n**1.** No prosecution for riot, or incitement to riot may be instituted except by or with the consent of the Director of Public Prosecutions.\n**2.** Numerous persons indicted for riot, or violent disorder, stemming from the same act may be tried in unison.\n**3.** Royal Military Police servants who encounter any of these offences outside their jurisdiction area as defined in §2(1),(2) of Royal Military Police Act 2024 should contact an officer from the Metropolitan Police Officer to proceed with the arrest.\n**4.** A constable acting in good faith under this Act shall be deemed to be acting in the execution of his duty.\n---\n### 11. Interpretation\n**1.** In this act, \"violence\" means any conduct, so that—\n  - (a) except in the context of affray, it includes violent conduct toward property as well as violent conduct towards persons, and\n  - (b) it is not restricted to conduct causing or intended to cause injury or damage but includes any other violent conduct (for example, throwing at or towards a person a missile of a kind capable of causing injury which does not hit or falls short).\n**2.** In this act, a person shall be considered not to be a public servant of a particular capacity where they act or present themselves outside the lawful scope of their appointment, office, or employment.\n  - (a) Accordingly, a person who holds a position within one branch of public service and represents themselves, whether expressly or by conduct, as holding authority within another distinct branch of public service to which they are not appointed, shall be treated as a person not being a public servant for the purposes of Section 7 of this Act.\n**3.** In this act, any reference to an \"appointment\", \"employment\", or \"public servant\" shall be construed as applying only within the scope of the individual's current team.\n  - (a) An individual shall be regarded as holding the powers, authority, and status of their appointment only whilst acting on the team which they are presently assigned.\n  - (b) Where an individual is not assigned to the relevant team or service or is acting outside the scope of their assigned role, they shall be treated as a civilian for the purposes of this Act.\n\nAccordingly, any person who purports to exercise powers, authority, or privileges of an appointment while not meeting the conditions in this section may be considered to be acting without lawful authority, and where applicable, may fall within Section 7 of this Act.\"",
                "Road Classifications and Offences Act": "### 1. Definitions\n**1.** The different classifications of road shall be defined as follows—\n  - (a) Motorways shall refer to large-volume routes which are intended for mass transportation links across the road network with three or more lanes of travel in each direction;\n  - (b) Roads identified by the character \"A\" shall refer to major roads which are intended for large-scale transportation links within the road network that are suitable for high volumes of traffic;\n    - (i) Roads identified as a dual carriageway shall refer to a road which has a central reservation separating the carriageways;\n  - (c) Roads identified by the character \"B\" shall refer to roads which exist with the intention of connecting areas and feeding the flow of traffic between A roads and smaller roads, suitable for medium volumes of traffic;\n  - (d) Roads identified by the character \"C\" shall refer to roads which exist with the intention of connecting unclassified roads with both A and B roads, suitable for varied volumes of traffic;\n  - (e) Unclassified roads are intended for localised traffic flow and are suitable for low volumes of traffic.\n**2.** Bicycles and Electrically Assisted Pedal Cycles—\n  - (a) A bicycle shall mean a two-wheeled, pedal-driven vehicle propelled by human power;\n  - (b) An electrically assisted pedal cycle (EAPC), including e-bikes and Sur-Ron-type vehicles, shall mean a bicycle fitted with an auxiliary electric motor not exceeding such specifications as may be prescribed by the Home Secretary from time to time;\n  - (c) Bicycles and EAPCs are not considered conveyances under this Act and are not subject to all general rules of the road except where it is explicitly stated of application in the Act.\n**3.** Recovery Operations—\n  - (a) \"Recovery Operations\" and \"Recovery Operators\" refers to private or public firms authorised to conduct the removal or recovery of impounded or damaged conveyances from the road. Recovery operators and their employees must abide by all road traffic laws and possess no special powers outright.\n**4.** Authority for Classification—\n  - (a) It shall be at the discretion of the development team to classify road routes in accordance with this Section.\n**5.** Conveyance—\n  - (a) Shall mean any mechanically propelled or non-mechanically propelled vehicle or device used, or capable of being used, for the purpose of transporting a person or goods on a road or public place.\n---\n### 2. Roads Classifications\n**1.** Road classifications as defined in Section 1 shall apply across all road networks.\n**2.** The group development team shall retain discretion to classify roads and set signage in line with this Act.\n---\n### 3. Speed Limitations\n**1.** The group development team shall retain discretion to classify road speeds with the appropriate signage.\n**2.** Bicycles and EAPCs are subject to the same speed restrictions as other conveyances under this Section.\n  - (a) Where no maximum speed is reasonably enforceable upon a bicycle or EAPC due to its design limitations, the operator must nevertheless ensure their manner of riding is safe, proportionate, and not careless or dangerous.\n---\n### 4. Road Traffic Offences\n**1.** Driving Without Due Care or Attention;\n  - (a) The offence of driving without due care or attention is committed when the person in control of a conveyance fails to meet the sufficient standards expected of a competent and careful driver.\n  - (b) Shall be classed as an offence worthy of a Fixed penalty notice or lawful arrest.\n**2.** Dangerous Driving;\n  - (a) The offence of dangerous driving is committed when the person in control of a conveyance fails to meet the sufficient standards expected of a competent and careful driver and is driving in a way which poses a significant danger to members of the public and other road users.\n  - (b) Shall be classed as an offence worthy of a Fixed penalty notice or lawful arrest, depending on severity. It is up to the constable's discretion to determine which sentence is worthy.\n**3.** Motor Racing on Public Roads;\n  - (a) The offence of motor racing on public roads is committed when two or more conveyances take part in a race, competition or trial on a public road.\n  - (b) The Home Office may authorise, or provide authorisation, for the holding of races, competitions or trials involving the use of motor vehicles on public roads.\n  - (c) Shall be classed as an offence worthy of a Lawful arrest.\n**4.** Leaving a Vehicle in a Dangerous Position;\n  - (a) The offence of leaving a conveyance in a dangerous position is committed when the person in charge of a conveyance permits the conveyance to remain stationary on a road or in a position or condition which poses a significant danger to members of the public and other road users.\n  - (b) Leaving a conveyance in a dangerous position shall be classed as an offence worthy of a Fixed penalty notice or lawful arrest on the condition that the perceived dangerous driving was witnessed by a Constable.\n**5.** Failure to Wear Protective Headgear;\n  - (a) The offence of failing to adorn protective headgear is committed when the person in operation, or the passenger, of a motorcycle, moped, EAPC or quad bike fails to adorn the necessary headgear to afford sufficient protection to the user or any passengers.\n    - (i) The description and standards of acceptable headgear is to be decided upon by the Home Secretary and may be altered at any given time with the necessary information to inform road users of said changes relayed as appropriate.\n  - (b) Whilst encouraged, individuals operating pedal bikes are not required to adorn protective headgear except where the bike's pedal is electrically equipped for speed.\n  - (c) Shall be classed as an offence worthy of a Fixed penalty notice.\n**6.** Driving or Parking in Bus Lanes;\n  - (a) The offence of driving or parking on bus lanes is committed when a person in charge of a conveyance drives or parks a conveyance wholly or partly on a bus lane.\n  - (b) Shall be classed as an offence worthy of a Fixed penalty notice.\n**7.** Driving or parking in bicycle lanes;\n  - (a) The offence of parking or driving in bicycle lanes is committed when a person in charge of a conveyance drives or parks a conveyance wholly or partly on a bicycle lane.\n  - (b) Shall be classed as an offence worthy of a Fixed penalty notice.\n**8.** Dangerous, inconsiderate or without due care or attention cycling;\n  - (a) The offence of dangerous, inconsiderate or without due care or attention cycling is committed when the person in control of a bicycle fails to meet the sufficient standards expected of an ordinary, safe vehicle competent and careful driver, drives inconsiderately without the public in mind, or drives without attention.\n  - (b) This shall apply to both pedal bikes and EAPC bikes (pedal and electrically assisted pedal bikes).\n  - (c) Shall be classed as an offence worthy of a Fixed Penalty Notice or lawful arrest.\n**9.** Driving a vehicle with an illegal modification;\n  - (a) The offence of driving a vehicle with an illegal modification is committed when the person in control of a vehicle fails to meet the criteria mentioned.\n  - (b) For example, an \"illegal modification\" includes a vehicle with a very low level of suspension, or likewise high level, tinted windows which obscure the occupants, or a distracting underglow of any sort, or a vehicle equipped with blue light emergency lighting reserved for emergency services without the proper lawful authority granted to Police Constables or Home Office emergency services.\n  - (c) Shall be classed as an offence worthy of a lawful arrest, fixed penalty notice or both.\n**10.** Failure to properly display licensing;\n  - (a) The offence of failure to properly display licensing is committed when a person in control of a vehicle operates a conveyance with obscured, impartial or not visible at all vehicle license plates on a public roadway, unless cooperating with exemptions set in Section 6a of this Act.\n  - (b) This applies to the front and rear plate.\n  - (c) The front plate must be white, and rear plate yellow/amber tint, and visible at all times regardless of time of day.\n  - (d) Shall be classed as an offence worthy of a lawful arrest, fixed penalty notice or both.\n**11.** Failure to stop for a Police Constable;\n  - (a) The offence of failure to stop for a police constable is committed when a person operating or otherwise in control of a conveyance, EAPC or bike of any type on any road or public roadway—\n    - (i) fails to stop when required to do so by a Constable acting in the execution of their duty;\n    - (ii) stops initially but then drives off without permission; or\n    - (iii) deliberately ignores, avoids, or attempts to evade a Constable after a clear direction to stop has been given.\n  - (b) A Constable may direct any person operating a conveyance, EAPC or bike of any type on any roadway to stop for the purposes of—\n    - (i) enforcing this Act or any other enactment;\n    - (ii) road safety or traffic management; investigating an offence; or\n    - (iii) protecting public safety.\n  - (c) A requirement to stop may be given by verbal instruction, hand signal, use of police vehicle lighting or sirens, or any other clear and reasonable indication that would be understood by a competent road user.\n**12.** Tampering with motor vehicles;\n  - (a) The offence of tampering with motor vehicles is committed when a person climbs onto/into a vehicle to impede, damage or glitch it.\n  - (b) This may only be an offence if the vehicle is in a public parking space or road.\n  - (c) Other roleplay aspects are included - e.g. tampering with brakes/other mechanisms where applicable.\n  - (d) Shall be classed as worthy of a fixed penalty notice or custody sentence depending on severity/repeat offences.\n**13.** Failure to use headlights;\n  - (a) The offence of failure to use headlights is committed when a driver does not operate their vehicle headlights on a public highway when it is dark or in areas of reduced visibility.\n  - (b) Shall be classed as worthy of a fixed penalty notice depending on severity/repeat offences.\n**14.** Misuse of warning equipment;\n  - (a) The offence of misuse of warning equipment is committed when a person unnecessarily uses amber lighting attached to a vehicle (or other such equipment with amber lights).\n  - (b) Shall be classed as worthy of a fixed penalty notice depending on severity/repeat offences.\n**15.** Failure to identify;\n  - (a) The offence of failure to identify is committed where a person in control of/driving a motor vehicle, or the passengers within a motor vehicle, do not identify themselves to a constable when requested to do so, or gives misleading/false information regarding their identity.\n  - (b) This offence shall only be committed when a Constable has given a lawful, reasonable direction for a person to stop their vehicle as aforementioned in subsection (11)(b).\n  - (c) Shall be considered worthy of a fixed penalty notice or lawful arrest depending on severity/repeat offences.\n**16.** Using a vehicle in dangerous condition;\n  - (a) The offence of using a vehicle in dangerous condition is committed where a person uses a vehicle in a way that involves a danger to any other person.\n  - (b) Where a Police Constable is unsatisfied at the following: (i) Condition of the vehicle/attached trailers/accessories; (ii) The purpose for the use of the vehicle; (iii) The number of passengers carried; or (iv) The manner in which they are being carried The weight, position/distribution of a load and how secure it is.\n    - (v) Shall be considered worthy of a fixed penalty notice or lawful arrest depending on severity/repeat offences.\n**17.** Failure to comply with directions;\n  - (a) The offence of failure to comply with directions is committed when a person in charge of a conveyance, EAPC or bike of any type who refuses to stop their vehicle, follow a diversion, or keep it to a particular line of traffic when directed to do so by a constable.\n  - (b) Also applies to pedestrians in regards to refusing to stop, follow diversions or keep to a set path by directions of a constable.\n  - (c) Shall be considered worthy of a fixed penalty notice or lawful arrest depending on severity/repeat offences.\n**18.** Obstruction of a highway;\n  - (a) The offence of obstruction of a highway is committed when a person and/or conveyance who willfully obstructs free passage of others without proper authority or sufficient excuse.\n  - (b) Shall be considered worthy of a fixed penalty notice or lawful arrest depending on severity/repeat offences.\n**19.** Exceeding the speed limit;\n  - (a) The offence of exceeding the speed limit is committed when a person operating a conveyance, EAPCor bike of any type willfully exceeds the speed limitations set out in Section 3 of the Act without proper authority or sufficient excuse.\n  - (b) Shall be considered worthy of a fixed penalty notice.\n**20.** Failure to stop after an accident;\n  - (a) The offence of failure to stop after an accident is committed when a person operating a conveyance, EAPC or bike of any type willfully and without proper reason fails to stop after an accident, whether it be briefly or long term to communicate with the other conveyance or individual the accident occurred with if another vehicle or person is involved, and fails to acknowledge the incident.\n  - (b) Shall be considered worthy of a fixed penalty notice or lawful arrest.\n---\n### 5. Punishments\n**1.** Offences under this Act may result in:\n  - (a) A Fixed Penalty Notice (FPN), as prescribed by the Fixed Penalty Notices Act 2025; or\n  - (b) Lawful arrest, where severity warrants.\n**2.** The scale of penalties may be amended by subsequent legislation.\n---\n### 6. Exemptions\n**1.** On-duty Police Constables and Home Office Approved emergency services may be:\n  - (a) Exempt from any given speed limitation, provided that following that speed limit may compromise any emergency response;\n  - (b) Exempt from any instructions given by traffic signals, traffic signs or road markings, and traffic directions that could prevent the execution of an employee's duty or emergency response, provided that in doing so, any risk can be managed or efforts are made to minimise any;\n  - (c) Exempt from any illegal parking and anything that may arise from it such as vehicle seizure as defined;\n  - (d) Exempt from the requirement to drive with proper licensure, where necessary for emergency response.\n**2.** Exemptions apply only where:\n  - (a) The driver is trained to an appropriate driver level as defined in internal policies;\n  - (b) Use of exemptions is proportional and risk-minimised;\n  - (c) Emergency vehicles display blue lightning unless doing so would compromise covert operations, for exemptions relating to parking;\n  - (d) The driver is heading to an emergent situation or escaping an immediate threat to their life; and\n  - (e) Emergency vehicles display blue lightning and utilise audio systems (sirens) unless doing so would compromise covert operations, for exemptions related to speed limitations, traffic signals, traffic signs, traffic directions or road markings.\n**3.** Liability remains with the driver if exemptions are misused.\n**4.** If a person granted an exemption, as described in subsection (1), causes a collision, their exemption shall be deemed nullified.\n---\n### 6a. Crown Immunities & State Vehicles\n**1.** A State Vehicle used by or on behalf of the Sovereign in the execution of official, ceremonial, constitutional or governmental functions shall be exempt from the requirements of Section 4(10) relating to the display of vehicle licensing and registrations.\n**2.** For the purposes of this Section, a \"State Vehicle\" means a conveyance designated by the Sovereign, for use in the performance of official State duties.\n**3.** A State Vehicle may be operated without the display of front or rear registration plates where such operation is authorised by the Sovereign.\n**4.** The exemptions contained within this Section shall not extend to members of the Royal Family, Royal Household employees, or any other person merely by reason of service to the Crown, except where acting under a separate exemption granted by the Sovereign.\n---\n### 7. Recovery Operations\n**1.** \"Recovery Operations\", along with \"Recovery Operators\", refers to private or public firms which possess the necessary approval from HM Companies House to operate with the removal or recovery of impounded or damaged conveyances from the road.\n**2.** Recovery operators and their employees must abide by all road traffic laws and possess no special powers outright.\n---\n### 7a. Seizure of Conveyances\n**1.** \"Seizure\" or \"Impounding\" of a conveyance shall be defined as;\n  - (a) Retention of a vehicle from its owner where this is done by either—\n    - (i) Preventing the conveyance from leaving its current location without force, such as by using a clamp or placing it onto a flatbed; or\n    - (ii) Moving the conveyance to a designated police impound or a recovery operator's impound.\n**2.** A conveyance may be seized, where not mentioned otherwise, in the following instances—\n  - (a) The user of the conveyance, determined by a Constable, has committed any of the following offences;\n    - (i) Dangerous driving;\n    - (ii) Leaving a conveyance in a dangerous position;\n    - (iii) Motor racing on a public highway - where a warning has been given;\n    - (iv) Driving without proper licensing;\n    - (v) Driving a vehicle with an illegal modification; or\n    - (vi) Using a vehicle in a dangerous condition, as it pertains to Section 4.\n  - (b) The conveyance has been stolen and then abandoned;\n  - (c) The conveyance is causing an obstruction to pedestrians or other vehicles;\n  - (d) The conveyance is used specifically in the commission of a criminal offence;\n  - (e) The conveyance is involved in a road traffic collision and is inoperable.\n---\n### 7b. Offences Specific to Recovery Operators\n**1.** Wrongful recovery of a conveyance—\n  - (a) The offence of wrongful recovery of a conveyance is committed when a recovery operator recovers a conveyance without;\n    - (i) the permission of the person responsible for the conveyance; or\n    - (ii) the criteria mentioned in Section 7a being met.\n  - (b) Wrongful recovery of a conveyance shall be classified as an offence worthy of—\n    - (i) removal of an individual's recovery license by HM Companies House; or\n    - (ii) lawful arrest.\n---\n### 8. Illegal Parking\n**1.** A conveyance may be defined as being parked illegally for the following reasons unless signage clearly denotes otherwise;\n  - (a) A conveyance parked on double yellow lines that is not loading or unloading.\n  - (b) A conveyance parked on a single yellow line outside the times shown on the accompanying sign.\n  - (c) A conveyance parked on red lines.\n  - (d) A conveyance parked in a zone marked with a clearway sign (red cross on blue background).\n  - (e) A conveyance parked in a zone marked as a loading bay that is not unloading.\n  - (f) A conveyance parked in a bay reserved for a specific vehicle (such as an ambulance) that does not meet the criteria of the bay.\n  - (g) A conveyance parked on yellow zig zag lines at any time with an accompanying sign.\n  - (h) A conveyance parked on white zig zag lines at any time.\n  - (i) A conveyance parked in such a way it is blocking the driveway of the house.\n  - (j) A conveyance parked on a pavement in such a way that it is blocking the path for passing civilians.\n  - (k) A conveyance blocking a public road or highway.\n**2.** If a private company has a parking permit from HM Treasury they may have permission to preclude themselves from being in violation of any of the above offences.\n**3.** Failure to comply with orders from a constable to correct any breaches of 8(1) can result in impoundment of a person's vehicle.\n**4.** Any vehicle left unattended found to be in breach of 8(1) may be impounded.\n**5.** If a private company has a vendor license from HM Companies House they may have permission to enter pedestrianised zones and preclude themselves from being in violation of any relevant offences above and any relevant road traffic offences.\n**6.** It shall be up to the recovery companies to be aware of all permits listed in the HM Companies House trello.\n---\n### 9. Recovery of a Conveyance\n**1.** A recovery operator may recover a conveyance upon the request of the person responsible for the conveyance, or if the criteria in Section 7a is met, or where mentioned otherwise.\n  - (a) If a vehicle is recovered without the criteria in Section 7a being met, the recovery operator is subject to a penalty as mentioned in Section 7b.\n**2.** A conveyance recovered at the request of its owner may be taken to an impound unless directed to a specific location by the person responsible for it.\n**3.** A conveyance recovered at the request of a constable may be taken to an impound unless directed to a specific location at the constable's request.\n---\n### 10. Reclamation of a Conveyance\n**1.** Any person has the right to reclaim their conveyance from the appropriate impound or lot with the approval of the operator which impounded it, provided they would not be committing an offence in reclaiming and using the conveyance.\n  - (a) If the vehicle was impounded at the request of a constable, the person must liaise with a constable in order to be granted the necessary approval to retrieve their vehicle.\n  - (b) Where a conveyance is impounded because of a police incident, a fee of up to £200 may be applied for the owner to have their vehicle returned.\n**2.** A person must be able to produce sufficient identification upon request to prove that they are the rightful owner of the conveyance.\n**3.** If a person takes a motor vehicle without the relevant approval as specified in 10(1) when said vehicle has been impounded or is in the process of being impounded, they shall commit the offence of Taking a motor vehicle without authority.\"",
            }

        let currentMain = 'EMS';
        let currentTimezone = 'local';

        function updateClock() {
            const now = new Date();
            const options = {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit',
                hour12: false
            };
            if (currentTimezone !== 'local') options.timeZone = currentTimezone;
            document.getElementById('clock').innerText = new Intl.DateTimeFormat('en-US', options).format(now);
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('timezone-select').addEventListener('change', (e) => {
            currentTimezone = e.target.value;
            updateClock();
        });

        function switchMainPage(category) {
            currentMain = category;
            ['EMS', 'Fire', 'LEO'].forEach(cat => {
                document.getElementById(`btn-${cat}`).classList.toggle('active', cat === category);
            });
            renderSubNav();
        }

        function renderSubNav() {
            const container = document.getElementById('sub-nav-container');
            container.innerHTML = ''; 
            const subpages = Object.keys(siteConfig[currentMain]);
            subpages.forEach((subpage, index) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = 'sub-nav-item';
                btn.innerText = subpage;
                btn.onclick = () => displayContent(subpage);
                li.appendChild(btn);
                container.appendChild(li);
                if (index === 0) displayContent(subpage);
            });
        }

        function displayContent(subpageKey) {
            document.querySelectorAll('.sub-nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === subpageKey);
            });

            document.getElementById('content-title').innerText = `${currentMain} - ${subpageKey}`;
            const rawText = siteConfig[currentMain][subpageKey];
            const contentBody = document.getElementById('content-body');
            contentBody.innerHTML = ''; 

            const defaultHr = document.createElement('hr');
            defaultHr.className = 'content-divider';
            contentBody.appendChild(defaultHr);

            const lines = rawText.split('\n');
            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed === '---') {
                    const hr = document.createElement('hr');
                    hr.className = 'content-divider';
                    contentBody.appendChild(hr);
                } else if (trimmed.startsWith('### ')) {
                    const subHeading = document.createElement('div');
                    subHeading.className = 'content-subheading';
                    subHeading.innerText = trimmed.replace('### ', '');
                    contentBody.appendChild(subHeading);
                } else {
                    const div = document.createElement('div');
                    div.className = 'content-line';
                    let processedLine = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    div.innerHTML = processedLine;
                    contentBody.appendChild(div);
                }
            });
        }
        switchMainPage('EMS');
    </script>
</body>
</html>
