<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay Assistant</title>
    <style>
        :root {
            /* Adjusted for an enhanced frosted glass blur */
            --glass-bg: rgba(255, 255, 255, 0.10);
            --glass-bg-hover: rgba(255, 255, 255, 0.16);
            --glass-bg-active: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-border-glow: rgba(255, 255, 255, 0.5);
            --text-color: #ffffff;
            --radius: 20px;
            --radius-sm: 10px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            color: var(--text-color);
        }

        body {
            background: #1a1a1a url('Background for WB.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        .glass-panel {
            background: var(--glass-bg);
            /* Increased blur to 8px for a deeper frosted finish */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-radius: var(--radius);
        }

        .controls {
            display: flex;
            align-items: center;
        }

        select {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 75px;
        }

        select:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-glow);
        }

        #clock {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            overflow: hidden;
        }

        nav {
            width: 260px;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .main-cats {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
        }

        .main-cats button {
            flex: 1;
            text-align: center;
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 8px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
        }

        .main-cats button:hover {
            background: var(--glass-bg-hover);
        }

        .main-cats button.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .sub-nav-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            list-style: none;
        }

        .sub-nav-item {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
        }

        .sub-nav-item:hover {
            background: var(--glass-bg-hover);
        }

        .sub-nav-item.active {
            background: var(--glass-bg-active);
            border-left: 3px solid #ffffff;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-weight: 600;
        }

        main {
            flex: 1;
            border-radius: var(--radius);
            padding: 36px;
            overflow-y: auto;
        }

        main h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .content-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
        }
