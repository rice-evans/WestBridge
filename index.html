<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay Assistant</title>
    <style>
        :root {
            /* High-contrast smoky liquid glass design tokens */
            --glass-bg: rgba(20, 20, 20, 0.45);
            --glass-bg-hover: rgba(20, 20, 20, 0.55);
            --glass-bg-active: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.20);
            --glass-border-glow: rgba(255, 255, 255, 0.45);
            --text-color: #ffffff;
            --radius: 20px;
            --radius-sm: 10px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            color: var(--text-color);
        }

        body {
            background: #1a1a1a url('Background for WB.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-radius: var(--radius);
        }

        .controls {
            display: flex;
            align-items: center;
        }

        select {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 75px;
        }

        select:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-glow);
        }

        #clock {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            overflow: hidden;
        }

        nav {
            width: 260px;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .main-cats {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
        }

        .main-cats button {
            flex: 1;
            text-align: center;
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 8px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
        }

        .main-cats button:hover {
            background: var(--glass-bg-hover);
        }

        .main-cats button.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .sub-nav-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            list-style: none;
        }

        .sub-nav-item {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
        }

        .sub-nav-item:hover {
            background: var(--glass-bg-hover);
        }

        .sub-nav-item.active {
            background: var(--glass-bg-active);
            border-left: 3px solid #ffffff;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-weight: 600;
        }

        main {
            flex: 1;
            border-radius: var(--radius);
            padding: 36px;
            overflow-y: auto;
        }

        main h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .content-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .content-subheading {
            font-size: 18px;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        
        .content-divider {
            border: 0;
            border-top: 1px solid var(--glass-border);
            margin: 22px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header class="glass-panel">
        <div id="clock">Loading Time...</div>
        <div class="controls">
            <select id="timezone-select">
                <option value="local">LOC</option>
                <option value="UTC">UTC</option>
                <option value="America/New_York">EST</option>
                <option value="America/Los_Angeles">PST</option>
                <option value="Europe/London">GMT</option>
            </select>
        </div>
    </header>

    <div class="workspace">
        <nav class="glass-panel">
            <div class="main-cats">
                <button id="btn-EMS" onclick="switchMainPage('EMS')">EMS</button>
                <button id="btn-Fire" onclick="switchMainPage('Fire')">Fire</button>
                <button id="btn-LEO" onclick="switchMainPage('LEO')">LEO</button>
            </div>
            <ul class="sub-nav-list" id="sub-nav-container"></ul>
        </nav>

        <main class="glass-panel">
            <h1 id="content-title">Welcome</h1>
            <div id="content-body">Select a department and subpage to begin.</div>
        </main>
    </div>

    <script>
        const siteConfig = {
            EMS: {
                "Equipment": "**LUCAS Machine**\n<span style='color: #ff4d4d; font-weight: 700;'>MUST NOT BE USED ON PEDIATRIC PATIENTS</span>\nDelivers consistent, high quality chest compressions during cardiac arrest.\n---\n**SAM Splint**\nMalleable aluminum splint for stabilizing fractures and joint injuries.\n---\n**Philips HeartStart Intrepid**\nProvides defibrillation, pacing, and advanced cardiac monitoring in cardiac emergencies.\n---\n**ROYAX Splint**\nRigid splint used for immobilizing long-bone fractures, often with adjustable features.\n---\n**Nasal Cannulas**\nDelivers low-flow oxygen for patients with mild respiratory distress or hypoxia.\n---\n**RISE Splint**\n*(Good for Wilderness Medicine)*\nCombines Rigid, Immobilizing, Stabilizing Elements for extremity injuries; very lightweight.\n---\n**BVM + NRB**\nProvides assisted ventilation and high-concentration oxygen for apneic or hypoventilating patients.\n---\n**CRAMER Vacuum Splint**\nConforms to the limb when air is evacuated, providing custom rigid immobilization for fractures.\n---\n**HALO Chest Seals**\nUsed to treat open chest wounds (sucking chest wounds) to prevent tension pneumothorax.\n---\n**Pressure Bandage**\nControls moderate to severe external bleeding through direct pressure.\n---\n**SPEAR Needles**\nUsed for needle decompression in suspected tension pneumothorax.\n---\n**Packing Gauze (Incl. Hemostatic)**\nUsed for wound packing in junctional or deep bleeding sites, promoting clotting.\n---\n**I-Gel Advanced Airway**\nSupraglottic airway device for emergency airway management without the need for intubation.\n---\n**CAT Tourniquets**\n<span style='color: #ff4d4d; font-weight: 700;'>MUST NOT BE USED ON HEAD, NECK OR TORSO.</span>\nControls life-threatening extremity hemorrhage when direct pressure fails.\n---\n**Rapid Sequence Intubation Kit**\nFacilitates secure airway placement in critically ill patients using sedatives and paralytics.\n---\n**IV Kit (16g -18g)**\nEstablishes intravenous access for fluid resuscitation, medication, or blood product delivery.\n---\n**Cricothyrotomy Kit**\n<span style='color: #ff4d4d; font-weight: 700;'>MUST NOT BE USED ON PEDIATRIC PATIENTS</span>\nEstablishes a surgical airway in \"can’t intubate, can’t oxygenate\" scenarios.\n---\n**Kendrick Extrication Device**\nStabilizes the spine and torso during extraction of seated trauma patients, especially in MVAs.\n---\n**Nasopharyngeal Airway**\nMaintains airway patency in semi-conscious patients with intact gag reflex.\n---\n**Scoop + Backboard + Collar**\nProvides spinal motion restriction for trauma patients during transport.",
                "Bleeding Control": "### Limbs (Arms and Legs)\n**1.** Apply direct pressure to the wound.\n**2.** Apply a tourniquet (TQ) high and tight on the affected limb.\n**3.** Flush the wound with 0.9% Saline.\n**4.** Pack the wound with hemostatic gauze.\n**5.** Apply an Israeli Pressure Bandage.\n---\n### Junctional Areas (Groin, Axilla, etc.)\n**1.** Apply direct pressure to the wound.\n**2.** Flush the wound with 0.9% Saline.\n**3.** Pack the wound with hemostatic gauze.\n**4.** Apply a SAM Junctional tourniquet.\n**5.** Pump the SAM Junctional Tourniquet until bleeding fully stops.\n---\n### Torso (Chest and Abdomen)\n**1.** Apply direct pressure to the wound (See Below).\n**2.** Do not pack or compress abdominal wounds.\n**3.** For Chest Wounds, apply a HALO vented chest seal.\n**4.** For Pelvic Fx, apply a pelvic binder at the level of the greater trochanters.\n**5.** Administer TXA, in accordance with Dosages.\n---\n### Neck\n**1.** Apply direct pressure to the wound.\n**2.** Pack the wound with hemostatic gauze, ensuring patient can still breathe.\n**3.** Secure dressing with light pressure (no circumferential wrap).\n**4.** Place a Nasopharyngeal airway to secure the patient's airway.\n**5.** Be prepared to intubate or place an I-Gel if the airway is further obstructed.",
                "Dosages": "### Cardiac Care & Emergencies\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest: 1mg Adrenaline every 3-5 minutes</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest: 1.25mg/kg Lidocaine</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest Post ROSC: 2-10mcg/min continuous IV infusion</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest Shock (Adult): 200 Joules Biphasic</span>\n<span style='color: #ff4d4d; font-weight: 700;'>• Cardiac Arrest Shock (Ped): 2 Joules/kg</span>\n• SVT: 6mg Adenosine, then 12mg if no response. <span style='font-weight: 700;'>MUST BE SALINE FLUSHED</span>\n• Bradycardia (Slow HR): 1mg Atropine every 3-5 minutes (Max 3mg)\n• High Blood Pressure: 5mcg/min Nitroglycerin Drip, increasing by 5mcg/min if required\n• Low Blood Pressure: 0.9% Saline (500mL Bolus)\n---\n### Analgesia & Sedation\n• Analgesia: 50mcg Fentanyl, increasing by 25mcg every 10-15 if required.\n• Analgesia: 0.1mg/kg Morphine, max of 10 per dose\n• Analgesia: 0.3mg/kg Ketamine, increasing by 0.25mg every 20-30 if required.\n• Agitated / Aggressive PT: 5-10mg IM Midazolam\n---\n### Seizure & Neurology\n• Seizure (1st Line): 5mg IV Midazolam\n• Seizure (2nd line): 5-10mg IV Diazepam\n• Stroke: IV tPA 0.9mg/kg (max 90mg), 10% as bolus over 1 minute, then 90% over 60 minutes\n---\n### Respiratory\n• Asthma / COPD: 2.5mg nebulized Albuterol in 3mL NS\n• Asthma / COPD: 0.5mg nebulized Ipratropium Bromide\n• Coughing Blood (Hemoptysis): 1g Tranexamic Acid (TXA) via Nebulizer\n• Respiratory Distress: 2g Magnesium Sulfate over 10-20 min\n---\n### Trauma & Bleeding\n• Major Bleeding: 1g Tranexamic Acid (TXA) in 100mL Saline IV\n• Anaphylaxis (IM): 0.4mg IM Epinephrine 1:1000\n• Antihistamine: 25-50mg IV/IM Diphenhydramine\n---\n### Antibiotics & Toxins\n• Antibiotics: 2g Ceftriaxone in 100mL Saline\n• Antibiotics (Mass casualty or rural): 1g Ertapenem in 100mL Saline\n• Overdose: 2mg Naloxone through nasal spray.\n• TCA Overdose, Hyperkalemia: 1-2 mEq/kg IV bolus Sodium Bicarbonate\n---\n### Metabolic & Electrolytes\n• Hypoglycemia (altered LOC, seizure, collapse): 25g (250mL) IV D10 Dextrose\n• Hypoglycemia (No IV Access): 1mg IM/SubQ Glucagon\n• Hyperkalemia: 10mL of 10% solution IV over 2–5 min Calcium Gluconate\n• Vomiting / Nausea: 4mg Ondansetron\n---\n### Oxygen Therapy\n• Nasal Cannula: 1 - 6 L/min\n• Simple Face Mask: 6 - 10 L/min\n• Non-Rebreather Mask (NRB): 10 - 15 L/min (maxed)\n• Bag-Valve Mask (BVM): 15+ L/min\n• RSI + Ventilator: 6 - 8 mL/kg (Tidal Volume)",
            },
            Fire: {
                "Equipment": "• Halligan Bar & Axe\n• SCBA (Self-Contained Breathing Apparatus)\n---\n### Visual Systems\n• Thermal Imaging Camera (TIC)\n• Fire Hoses (1.75\" and 2.5\")",
                "Fire Suppress": "• Class A: Ordinary combustibles (Water, Foam)\n• Class B: Flammable liquids (CO2, Dry Chemical)\n---\n### Specialty Responses\n• Class C: Electrical fires (Turn off power, CO2)\n• Class D: Combustible metals (Special Dry Powder)",
                "Hazmat": "• Zone Setup: Hot Zone (Exclusion), Warm Zone (Decon), Cold Zone (Command).\n---\n### References\n• Consult ERG (Emergency Response Guidebook) for identification placards."
            },
            LEO: {
                "Equipment": "• Duty Belt & Holster\n• Body Worn Camera (BWC)\n---\n### Protective Wear\n• Ballistic Vest\n• Less-Lethal (Taser, OC Spray, Baton)",
                "Miranda Rights": "\"You have the right to remain silent.\nAnything you say can and will be used against you in a court of law.\n---\n### Right to Counsel\nYou have the right to an attorney...\"",
                "Codes": "• 10-4: Acknowledged\n• 10-7: Out of Service\n• 10-8: In Service\n---\n### Emergency Dispatch\n• 10-20: Location\n• Code 3: Emergency Response (Lights & Sirens)"
            }
        };

        let currentMain = 'EMS';
        let currentTimezone = 'local';

        function updateClock() {
            const now = new Date();
            const options = {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit',
                hour12: false
            };
            if (currentTimezone !== 'local') options.timeZone = currentTimezone;
            document.getElementById('clock').innerText = new Intl.DateTimeFormat('en-US', options).format(now);
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('timezone-select').addEventListener('change', (e) => {
            currentTimezone = e.target.value;
            updateClock();
        });

        function switchMainPage(category) {
            currentMain = category;
            ['EMS', 'Fire', 'LEO'].forEach(cat => {
                document.getElementById(`btn-${cat}`).classList.toggle('active', cat === category);
            });
            renderSubNav();
        }

        function renderSubNav() {
            const container = document.getElementById('sub-nav-container');
            container.innerHTML = ''; 
            const subpages = Object.keys(siteConfig[currentMain]);
            subpages.forEach((subpage, index) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = 'sub-nav-item';
                btn.innerText = subpage;
                btn.onclick = () => displayContent(subpage);
                li.appendChild(btn);
                container.appendChild(li);
                if (index === 0) displayContent(subpage);
            });
        }

        function displayContent(subpageKey) {
            document.querySelectorAll('.sub-nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === subpageKey);
            });

            document.getElementById('content-title').innerText = `${currentMain} - ${subpageKey}`;
            const rawText = siteConfig[currentMain][subpageKey];
            const contentBody = document.getElementById('content-body');
            contentBody.innerHTML = ''; 

            const defaultHr = document.createElement('hr');
            defaultHr.className = 'content-divider';
            contentBody.appendChild(defaultHr);

            const lines = rawText.split('\n');
            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed === '---') {
                    const hr = document.createElement('hr');
                    hr.className = 'content-divider';
                    contentBody.appendChild(hr);
                } else if (trimmed.startsWith('### ')) {
                    const subHeading = document.createElement('div');
                    subHeading.className = 'content-subheading';
                    subHeading.innerText = trimmed.replace('### ', '');
                    contentBody.appendChild(subHeading);
                } else {
                    const div = document.createElement('div');
                    div.className = 'content-line';
                    let processedLine = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    div.innerHTML = processedLine;
                    contentBody.appendChild(div);
                }
            });
        }
        switchMainPage('EMS');
    </script>
</body>
</html>
